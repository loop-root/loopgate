version: 0.1.0

# Loopgate starter policy
#
# This checked-in signed policy is intentionally conservative for a fresh public
# checkout:
# - Claude read-oriented hooks are allowed within the repo root
# - Claude writes require approval
# - ambient shell, HTTP, and governed MCP stay disabled until an operator opts in
# - policy and persona mutation remain denied
#
# If you want a more permissive local-development starting point, render a
# reviewed template first:
#   go run ./cmd/loopgate-policy-admin render-template -preset developer
#
# Then sign and apply that reviewed policy through the normal signed-policy
# workflow.

tools:

  claude_code:
    deny_unknown_tools: true
    tool_policies:
      Bash:
        enabled: false
      Read:
        enabled: true
        allowed_roots:
          - "."
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Glob:
        enabled: true
        allowed_roots:
          - "."
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Grep:
        enabled: true
        allowed_roots:
          - "."
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Write:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
        denied_paths:
          - "core/policy"
          - ".claude/settings.json"
      Edit:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
      MultiEdit:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
      WebFetch:
        enabled: false
      WebSearch:
        enabled: false

  mcp_gateway:
    deny_unknown_servers: true
    servers: {}

  filesystem:
    allowed_roots:
      - "."
    denied_paths:
      - "core/policy"
      - "persona"
      - "runtime/state"
    read_enabled: true
    write_enabled: true
    write_requires_approval: true

  http:
    enabled: false
    allowed_domains: []
    requires_approval: true
    timeout_seconds: 10

  shell:
    enabled: false
    allowed_commands: []
    requires_approval: true

logging:
  log_commands: true
  log_tool_calls: true
  audit_detail:
    hook_projection_level: full

safety:
  allow_persona_modification: false
  allow_policy_modification: false
