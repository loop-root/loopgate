version: 0.1.0

# Loopgate Working Policy
# This checked-in file is the current local development policy for the active
# Loopgate harness. It is authoritative for local runtime behavior, but it is
# not yet a polished open-source-safe default.
# The policy engine enforces these constraints before any tool executes.

tools:

  claude_code:
    deny_unknown_tools: true
    tool_policies:
      Bash:
        enabled: true
        allowed_command_prefixes:
          - "ls"
          - "pwd"
          - "find "
          - "rg "
          - "grep "
          - "cat "
          - "sed -n "
          - "head "
          - "tail "
          - "wc "
          - "sort "
          - "git status"
          - "git diff"
        denied_command_prefixes:
          - "rm "
          - "curl "
      Read:
        enabled: true
        allowed_roots:
          - "."
          - "/Users/adalaide/Dev"
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Glob:
        enabled: true
        allowed_roots:
          - "."
          - "/Users/adalaide/Dev"
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Grep:
        enabled: true
        allowed_roots:
          - "."
          - "/Users/adalaide/Dev"
        denied_paths:
          - "runtime/state"
          - "core/policy"
      Write:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
        denied_paths:
          - "core/policy"
          - ".claude/settings.json"
      Edit:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
      MultiEdit:
        enabled: true
        requires_approval: true
        allowed_roots:
          - "."
      WebFetch:
        enabled: true
        allowed_domains:
          - "github.com"
      WebSearch:
        enabled: false

  filesystem:
    # Allow the working tree by default so Loopgate can operate on the repo it owns.
    # Sensitive internal state and policy roots are denied explicitly below.
    allowed_roots:
      - "."
    # Optional explicit deny list (even if inside allowed_roots)
    denied_paths:
      - ".morph/memory"
      - "core/memory/ledger"
      - "core/memory/distillates"
      - "core/policy"
      - "persona"
      - "runtime/state/memory"
    read_enabled: true
    write_enabled: true
    write_requires_approval: true

  http:
    enabled: true
    allowed_domains: []
    requires_approval: true
    timeout_seconds: 10

  shell:
    enabled: true
    allowed_commands:
      - "git"
      - "go"
      - "gofmt"
      - "rg"
      - "ls"
      - "cat"
      - "pwd"
      - "printf"
      - "mkdir"
      - "cp"
      - "mv"
      - "sed"
      - "grep"
      - "find"
      - "head"
      - "tail"
      - "wc"
      - "sort"
      - "uniq"
      - "tr"
      - "xargs"
      - "make"
      - "npm"
      - "pnpm"
      - "node"
      - "python3"
      - "uv"
      - "swift"
      - "xcodebuild"
    requires_approval: true

  morphlings:
    spawn_enabled: false
    max_active: 5
    require_template: true

logging:
  log_commands: true
  log_tool_calls: true
  log_memory_promotions: true

memory:
  auto_distillate: true
  require_promotion_approval: true
  continuity_review_required: false
  submit_previous_min_events: 3
  submit_previous_min_payload_bytes: 512
  submit_previous_min_prompt_tokens: 120

safety:
  allow_persona_modification: false
  allow_policy_modification: false
