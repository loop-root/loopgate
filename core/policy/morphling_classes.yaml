version: "1"

classes:
  - name: reviewer
    description: "Read-only analysis and inspection within approved sandbox inputs"
    capabilities:
      allowed:
        - fs_list
        - fs_read
    sandbox:
      allowed_zones:
        - imports
        - scratch
        - workspace
    resource_limits:
      max_time_seconds: 300
      max_tokens: 50000
      max_disk_bytes: 52428800
    ttl:
      spawn_approval_ttl_seconds: 300
      capability_token_ttl_seconds: 360
      review_ttl_seconds: 86400
    spawn_requires_approval: false
    completion_requires_review: true
    max_concurrent: 3

  - name: editor
    description: "Read and write files within approved sandbox scope"
    capabilities:
      allowed:
        - fs_list
        - fs_read
        - fs_write
    sandbox:
      allowed_zones:
        - agents
        - imports
        - outputs
        - scratch
        - workspace
    resource_limits:
      max_time_seconds: 600
      max_tokens: 100000
      max_disk_bytes: 104857600
    ttl:
      spawn_approval_ttl_seconds: 300
      capability_token_ttl_seconds: 660
      review_ttl_seconds: 86400
    spawn_requires_approval: true
    completion_requires_review: true
    max_concurrent: 2

  - name: tester
    description: "Inspect and summarize sandbox-scoped test inputs"
    capabilities:
      allowed:
        - fs_list
        - fs_read
    sandbox:
      allowed_zones:
        - imports
        - logs
        - scratch
        - workspace
    resource_limits:
      max_time_seconds: 300
      max_tokens: 30000
      max_disk_bytes: 52428800
    ttl:
      spawn_approval_ttl_seconds: 300
      capability_token_ttl_seconds: 360
      review_ttl_seconds: 86400
    spawn_requires_approval: false
    completion_requires_review: true
    max_concurrent: 2

  - name: researcher
    description: "Read imported evidence and summarize quarantined results"
    capabilities:
      allowed:
        - fs_list
        - fs_read
    sandbox:
      allowed_zones:
        - imports
        - quarantine
        - scratch
    resource_limits:
      max_time_seconds: 120
      max_tokens: 40000
      max_disk_bytes: 26214400
    ttl:
      spawn_approval_ttl_seconds: 300
      capability_token_ttl_seconds: 180
      review_ttl_seconds: 86400
    spawn_requires_approval: false
    completion_requires_review: true
    max_concurrent: 3

  - name: builder
    description: "Read inputs and write outputs within approved sandbox scope"
    capabilities:
      allowed:
        - fs_list
        - fs_read
        - fs_write
    sandbox:
      allowed_zones:
        - imports
        - outputs
        - scratch
        - workspace
    resource_limits:
      max_time_seconds: 900
      max_tokens: 50000
      max_disk_bytes: 524288000
    ttl:
      spawn_approval_ttl_seconds: 300
      capability_token_ttl_seconds: 960
      review_ttl_seconds: 86400
    spawn_requires_approval: true
    completion_requires_review: true
    max_concurrent: 1
