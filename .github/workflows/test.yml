# Runs the full test suite with the race detector on every push and PR.
name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -count=1 ./...
