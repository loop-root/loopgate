# Runs golang.org/x/vuln against the module graph. Complements scripts/govulncheck.sh for CI.
name: govulncheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
