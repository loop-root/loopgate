name: govulncheck

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: make vuln
