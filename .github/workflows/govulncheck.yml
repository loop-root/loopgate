name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          make vuln 2>&1 | tee artifacts/govulncheck.log
      - name: upload govulncheck logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: govulncheck-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: ignore
      - name: summarize govulncheck job
        if: always()
        run: |
          {
            echo "## govulncheck / govulncheck"
            echo "- status: ${{ job.status }}"
            echo "- command: \`make vuln\`"
            echo "- logs artifact: \`govulncheck-logs-${{ github.run_id }}-${{ github.run_attempt }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
