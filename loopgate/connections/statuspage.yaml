provider: statuspage
grant_type: public_read
subject: github
api_base_url: https://www.githubstatus.com/api/v2
allowed_hosts:
  - www.githubstatus.com
capabilities:
  - name: statuspage.summary_get
    description: Read the public GitHub status summary.
    method: GET
    path: /status.json
    content_class: structured_json
    extractor: json_nested_selector
    response_fields:
      - name: status_description
        json_path: status.description
        sensitivity: tainted_text
        max_inline_bytes: 128
        allow_blob_ref_fallback: false
      - name: status_indicator
        json_path: status.indicator
        sensitivity: tainted_text
        max_inline_bytes: 32
        allow_blob_ref_fallback: false
