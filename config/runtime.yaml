version: "1"

# Optional: require POST /v1/session/open peers to resolve to this absolute executable path (after filepath.Clean).
# Empty = disabled (default). Use for shipped desktop bundles with a stable client binary path.
control_plane:
  expected_session_client_executable: ""
  # Bounds concurrent local control-plane HTTP handlers. This keeps overload
  # from creating unbounded goroutines waiting on audit fsync, state locks,
  # provider calls, or subprocess execution.
  max_in_flight_http_requests: 256

# Reserved deployment identity fields. Leave empty for the current local-first
# open-source build; they are not part of the active setup flow.
tenancy:
  deployment_tenant_id: ""
  deployment_user_id: ""

logging:
  audit_ledger:
    max_event_bytes: 262144
    rotate_at_bytes: 134217728
    segment_dir: "runtime/state/loopgate_event_segments"
    manifest_path: "runtime/state/loopgate_event_segments/manifest.jsonl"
    verify_closed_segments_on_startup: true
    # Production/HIPAA-prep guard: refuse to start if checkpoints are disabled.
    # This prevents silently falling back to hash-chain-only ledgers, which can
    # be replaced wholesale by a same-user filesystem writer.
    require_hmac_checkpoint: true
    # Default tamper-evidence posture: HMAC-SHA256 checkpoints over the hash-chain head
    # with a key stored outside the JSONL. On macOS-first Loopgate, first server start
    # bootstraps this default key into Keychain if it does not exist yet.
    hmac_checkpoint:
      enabled: true
      interval_events: 256
      secret_ref:
        id: "audit_ledger_hmac"
        backend: "macos_keychain"
        account_name: "loopgate.audit_ledger_hmac"
        scope: "local"
  # Optional local-first export cursor for streaming the authoritative audit
  # ledger to a configured downstream sink later. Local append still happens
  # first; this state is only the shipping cursor and retry metadata.
  audit_export:
    enabled: false
    destination_kind: ""
    destination_label: ""
    endpoint_url: ""
    authorization:
      scheme: "bearer"
      # secret_ref is required when enabled for a remote authenticated sink.
      # Example:
      # secret_ref:
      #   id: "audit_export_admin_bearer"
      #   backend: "macos_keychain"
      #   account_name: "loopgate.audit_export.admin_bearer"
      #   scope: "local"
    tls:
      enabled: false
      server_name: ""
      pinned_server_public_key_sha256: ""
      minimum_remaining_validity_seconds: 0
      # For remote TLS export, mTLS should be enabled and backed by
      # secret refs rather than plaintext file paths.
      # pinned_server_public_key_sha256 is optional defense in depth when the
      # remote sink has a stable public key and operators want explicit pin-based
      # trust repair on rotation.
      # minimum_remaining_validity_seconds can fail closed before a client cert,
      # root CA, or remote leaf cert is too close to expiry.
      # root_ca_secret_ref:
      #   id: "audit_export_root_ca"
      #   backend: "macos_keychain"
      #   account_name: "loopgate.audit_export.root_ca"
      #   scope: "local"
      # client_certificate_secret_ref:
      #   id: "audit_export_client_certificate"
      #   backend: "macos_keychain"
      #   account_name: "loopgate.audit_export.client_certificate"
      #   scope: "local"
      # client_private_key_secret_ref:
      #   id: "audit_export_client_private_key"
      #   backend: "macos_keychain"
      #   account_name: "loopgate.audit_export.client_private_key"
      #   scope: "local"
    state_path: "runtime/state/audit_export_state.json"
    max_batch_events: 500
    max_batch_bytes: 1048576
    min_flush_interval_seconds: 5
  # Optional text logs under directory (slog). Not authoritative; loopgate_events.jsonl is.
  # Levels: error, warn, info, debug, trace (per-channel keys: audit, server, client, socket, ledger, model).
  # A local settings surface may write runtime/state/loopgate_diagnostic_logging.override.json
  # (merged on load; restart Loopgate).
  diagnostic:
    enabled: true
    default_level: debug
    directory: runtime/logs
    levels: {}
    files:
      audit: audit.log
      server: server.log
      client: client.log
      socket: socket.log
      ledger: ledger.log
      model: model.log
